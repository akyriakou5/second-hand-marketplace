<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
<!--    Makes the page responsive on all devices-->
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" type="image/png" href="assets/logo4.png">
<!--    Title show in the browser tab-->
    <title>Second-Hand Market | Login</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/app.js" defer></script>
    <script src="js/auth.js" defer></script>
</head>
<body>
<div id="navbar"></div>

<main class="container section">
<!--    Card container for the login form-->
    <div class="card" style="max-width:560px;margin:0 auto;">
        <h2 style="margin:0 0 8px;">Seller Login</h2>
        <p class="muted" style="margin:0 0 14px;">Login to access your dashboard.</p>

<!--        Login form-->
        <form id="loginForm" class="form" novalidate>
<!--            Email input field-->
            <div class="form-row">
<!--                Label for email input-->
                <label for="email">Email</label>
                <input class="input" id="email" name="email" type="email" placeholder="you@example.com" required />
<!--                Error message for email-->
                <div class="error" data-error="email"></div>
            </div>

<!--            Password input field-->
            <div class="form-row">
<!--                Label for password input-->
                <label for="password">Password</label>
<!--                Password input box-->
                <input class="input" id="password" name="password" type="password" placeholder="••••••••" required />
<!--              Error message for password-->
                <div class="error" data-error="password"></div>
            </div>

            <div id="formMsg" class="small"></div>

            <div class="inline">
<!--                Login button-->
                <button class="btn primary" type="submit">Login</button>
<!--                Link to register page-->
                <a class="btn" href="register.html">Create account</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
